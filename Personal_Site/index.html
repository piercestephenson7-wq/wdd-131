<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparkle & Blast | Professional Power Washing</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>
<body>
    <header>
        <div id="logo">
            <img src="images/logo_pressurewashing.jpg" alt="Sparkle & Blast Logo">
            <h1>Sparkle & Blast</h1>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="#quote">Get a Quote</a>
            <a href="#contact">Contact</a>
            <a href="about.html">About Us</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Instant Curb Appeal</h1>
        <p>Professional pressure washing for driveways, decks, and siding.</p>
        <button onclick="location.href='#quote'">Book Your Blast</button>
    </section>

    <h2>Our Services</h2>
    <div id="services">
    </div>

    <section id="quote">
        <h2>Instant Estimate</h2>
        <div class="calculator">
            <label>Square Footage (approx):</label>
            <input type="number" id="sqft" placeholder="e.g. 500">
            <button onclick="calculatePrice()">Calculate Cost</button>
            <p id="result"></p>
        </div>
    </section>
    <div id="contact">
        <p>Our number: 123-456-7890</p>
    </div>
</body>
</html>
