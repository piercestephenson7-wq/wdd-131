<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparkle & Blast | Professional Power Washing</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <img src="logo_pressurewashing.jpg" alt="Sparkle & Blast Logo" id="logo">
            <div class="logo">Sparkle & Blast</div>
            <a href="#services">Services</a>
            <a href="#quote">Get a Quote</a>
            <a href="#contact">Contact</a>
            <a href="#about">About Us</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Renew Your Home’s Curb Appeal</h1>
        <p>Professional pressure washing for driveways, decks, and siding.</p>
        <button onclick="location.href='#quote'">Book Your Blast</button>
    </section>

    <h2>Our Services</h2>
    <div id="services">
        <div class="carousel-track">
            <div class="card">Driveways</div>
            <div class="card">House Siding</div>
            <div class="card">Roof Cleaning</div>
        </div>

        <button id="prev">Prev</button>
        <button id="next">Next</button>
    </div>

    <section id="quote">
        <h2>Instant Estimate</h2>
        <div class="calculator">
            <label>Square Footage (approx):</label>
            <input type="number" id="sqft" placeholder="e.g. 500">
            <button onclick="calculatePrice()">Calculate Cost</button>
            <p id="result"></p>
        </div>
    </section>
</body>
</html>
