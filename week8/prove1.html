<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Battle Beasts">
    <meta property="og:description" content="Where monsters collide in an epic showdown">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="images/red_monster.jpg">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Battle Beasts">
    <meta name="twitter:description" content="Where monsters collide in an epic showdown">
    <meta name="twitter:image" content="images/red_monster.jpg">
    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.ico">
    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <title>Battle Beasts</title>
    <link rel="stylesheet" href="prove1.css">
    <script src="prove1.js" defer></script>
</head>
<body>
    <div class="card">
        <img class="image" src="images/blue_monster.jpg" alt="Blue Monster">
        <h1 class="name">Blue Monster</h1>
        <div class="stats">
            <p>Class: Warrior</p>
            <p>Level: 5</p>
            <p>Health: 100</p>
        </div>
        <button class="buttons">Attacked</button>
        <button class="buttons">Level Up</button>
    </div>
    <div class="card">
        <img class="image" src="images/orange_monster.png" alt="Orange Monster">
        <h1 class="name">Orange Monster</h1>
        <div class="stats">
            <p>Class: Mage</p>
            <p>Level: 7</p>
            <p>Health: 80</p>
        </div>
        <button class="buttons">Attacked</button>
        <button class="buttons">Level Up</button>
    </div>
    <div class="card">
        <img class="image" src="images/teal_monster.jpg" alt="Teal Monster">
        <h1 class="name">Teal Monster</h1>
        <div class="stats">
            <p>Class: Archer</p>
            <p>Level: 6</p>
            <p>Health: 90</p>
        </div>
        <button class="buttons">Attacked</button>
        <button class="buttons">Level Up</button>
    </div>
</body>
</html>
