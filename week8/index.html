<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment</title>
    <link rel="stylesheet" href="index.css">
    <script src="objects.js" defer></script>
</head>
<body>
    
<h1 id="courseName"></h1>
<h2 id="courseCode"></h2>
<label for="sectionNumber">Section Number</label>
<input id="sectionNumber" />
<button id="enrollStudent">Enroll Student</button>
<table>
  <thead>
    <tr>
      <th>Section#</th>
      <th>Room#</th>
      <th>#Enrolled</th>
      <th>Days</th>
      <th>Instructor</th>
    </tr>
  </thead>
  <tbody id="sections"></tbody>
</table>

<label for="newRoomNumber">New Room Number</label>
<input id="newRoomNumber" />
<label for="newEnrolled">New Enrolled</label>
<input id="newEnrolled" />
<label for="newDays">New Days</label>
<input id="newDays" />
<label for="newInstructor">New Instructor</label>
<input id="newInstructor" />
<button id="addSection">Add Section</button>

</body>
</html>
